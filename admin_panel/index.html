<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lovedogs 360 Admin</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .card { border: 1px solid #ccc; padding: 20px; margin-bottom: 20px; border-radius: 5px; }
        .stat { font-size: 24px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Lovedogs 360 Admin</h1>
    
    <div class="card">
        <h2>Statistics</h2>
        <div id="stats">Loading...</div>
    </div>

    <div class="card">
        <h2>Actions</h2>
        <button onclick="suspendUserPrompt()">Suspend a User</button>
    </div>

    <script>
        const BASE_URL = (localStorage.getItem('LOVEDOGS_API_URL') || 'https://hunter-production-0341.up.railway.app').replace(/\/+$/, '');
        const TOKEN = (prompt("Enter Admin Token:") || '').replace(/^Bearer\s+/i, '');

        async function loadStats() {
            try {
                const res = await fetch(`${BASE_URL}/admin/stats`, {
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                if(!res.ok) throw new Error("Auth failed");
                const data = await res.json();
                document.getElementById('stats').innerHTML = `
                    Users: ${data.total_users}<br>
                    Services: ${data.total_services}<br>
                    Orders: ${data.total_orders}<br>
                    Events: ${data.total_events}<br>
                    Revenue: ${data.total_revenue}
                `;
            } catch(e) {
                document.getElementById('stats').innerHTML = "Error loading stats (Check token)";
            }
        }

        async function suspendUserPrompt() {
            const id = prompt("User ID to suspend:");
            if(!id) return;
            try {
                const res = await fetch(`${BASE_URL}/admin/users/${id}/suspend`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${TOKEN}` }
                });
                const data = await res.json();
                alert(JSON.stringify(data));
            } catch(e) {
                alert("Error suspending user");
            }
        }

        if(TOKEN) loadStats();
    </script>
</body>
</html>
